<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio to Transcript</title>
    <style>
      :root {
        --paper: #f8f1e7;
        --ink: #17211f;
        --panel: rgba(255, 251, 245, 0.84);
        --line: rgba(23, 33, 31, 0.12);
        --accent: #d6622b;
        --accent-dark: #9f4319;
        --muted: #53615d;
        --success: #22543d;
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(214, 98, 43, 0.22), transparent 32%),
          linear-gradient(140deg, #efe4d1 0%, #f7f2ea 48%, #e3efe9 100%);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 32px auto;
        display: grid;
        gap: 20px;
      }

      .hero,
      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(27, 34, 31, 0.08);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-dark);
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 5vw, 4.4rem);
        line-height: 0.98;
        max-width: 10ch;
      }

      .hero p {
        max-width: 55ch;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .panel {
        padding: 24px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      .dropzone {
        position: relative;
        border: 1.5px dashed rgba(23, 33, 31, 0.24);
        border-radius: 20px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.42);
      }

      input[type="file"] {
        width: 100%;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 20px;
        font: inherit;
        font-size: 1rem;
        color: white;
        background: linear-gradient(135deg, var(--accent) 0%, #c84b1d 100%);
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease;
        box-shadow: 0 14px 30px rgba(200, 75, 29, 0.22);
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .status {
        min-height: 1.2rem;
        font-size: 0.98rem;
        color: var(--muted);
      }

      .status.error {
        color: #8f1d1d;
      }

      .status.success {
        color: var(--success);
      }

      .transcript-box {
        white-space: pre-wrap;
        line-height: 1.7;
        min-height: 220px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(23, 33, 31, 0.1);
      }

      .meta {
        font-size: 0.92rem;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 18px, 960px);
          margin: 12px auto 24px;
        }

        .hero,
        .panel {
          border-radius: 18px;
        }

        .hero,
        .panel,
        .dropzone {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Guardian Angel</p>
        <h1>Turn mission audio into clear text.</h1>
        <p>
          Upload an audio file, transcribe it locally with faster-whisper on your machine,
          and review the result inside Guardian Angel before we send it to the next step.
        </p>
      </section>

      <section class="panel">
        <form id="transcribe-form">
          <label class="dropzone">
            <strong>Choose mission audio</strong>
            <p class="meta">Guardian Angel runs transcription locally on your machine with no per-file API cost.</p>
            <input id="audio-input" name="audio" type="file" accept="audio/*,video/*" required />
          </label>
          <button id="submit-button" type="submit">Create transcript</button>
          <div id="status" class="status"></div>
        </form>
      </section>

      <section class="panel">
        <p class="eyebrow">Guardian Angel Transcript</p>
        <div id="transcript-meta" class="meta">No transcript yet.</div>
        <div id="transcript-output" class="transcript-box">Your transcription will appear here.</div>
      </section>
    </main>

    <script>
      const form = document.getElementById("transcribe-form");
      const audioInput = document.getElementById("audio-input");
      const submitButton = document.getElementById("submit-button");
      const status = document.getElementById("status");
      const transcriptOutput = document.getElementById("transcript-output");
      const transcriptMeta = document.getElementById("transcript-meta");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const file = audioInput.files[0];

        if (!file) {
          status.textContent = "Choose an audio file first.";
          status.className = "status error";
          return;
        }

        submitButton.disabled = true;
        status.textContent = `Guardian Angel is transcribing ${file.name} locally...`;
        status.className = "status";
        transcriptMeta.textContent = "Transcription in progress...";
        transcriptOutput.textContent = "";

        const formData = new FormData();
        formData.append("audio", file);

        try {
          const response = await fetch("/api/transcribe", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Transcription failed.");
          }

          transcriptOutput.textContent = data.text || "No spoken text was detected.";

          const metaParts = [];
          if (data.language_code) {
            metaParts.push(`Language detected: ${data.language_code} • Model: ${data.model || "unknown"}`);
          } else {
            metaParts.push("Transcription complete.");
          }
          if (data.medicNotes?.ok) {
            metaParts.push("Medic note sent to Guardian Angel.");
          } else if (data.medicNotes?.skipped) {
            metaParts.push(data.medicNotes.reason);
          } else if (data.medicNotes && data.medicNotes.ok === false) {
            const detail =
              data.medicNotes.error ||
              (data.medicNotes.status != null
                ? `HTTP ${data.medicNotes.status}`
                : "Medic notes request failed.");
            metaParts.push(`Medic notes: ${detail}`);
          }
          transcriptMeta.textContent = metaParts.join(" • ");

          const medicFailed = data.medicNotes && data.medicNotes.ok === false;
          status.textContent = medicFailed
            ? "Transcription complete; medic notes step failed (see details below)."
            : "Transcription complete.";
          status.className = medicFailed ? "status error" : "status success";
        } catch (error) {
          transcriptOutput.textContent = "No transcript available.";
          transcriptMeta.textContent = "The request did not complete.";
          status.textContent = error.message || "Unexpected error.";
          status.className = "status error";
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
